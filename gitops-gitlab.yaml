stages: [render, deploy]

variables:
  VALUES_ROOT: "platform-gitops/values"
  MANIFESTS_OUT_DIR: "manifests"
  DEFAULT_CHART_MS: "charts/quarkus-ms"
  DEFAULT_CHART_BACKSTAGE: "charts/backstage"
  DEFAULT_CHART_BATCH: "charts/quarkus-batch"
  CI_SKIP_PUSH_OPTION: "-o ci.skip"
  ARGO_SYNC_ALLOWED_ENVS: "development"
  PRODUCTION_ENV: "production"
  ARGO_SYNC_DISABLED_APPS: "none"

render_manifests:
  stage: render
  resource_group: gitops-manifests
  image: layer-kraft.registry.saas.cagip.group.gca/ci-tools/helm:3
  before_script:
    - set -euo pipefail
    - git config user.email "ci-bot@local"
    - git config user.name "ci-bot"
    # push token si tu commites dans le même repo
    - git remote set-url origin "https://oauth2:${GIT_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch --all --tags --prune
    - git checkout -B "${CI_COMMIT_BRANCH}" "origin/${CI_COMMIT_BRANCH}"
  script:
    - |
      set -euo pipefail

      echo "CI_COMMIT_SHA=$CI_COMMIT_SHA"
      echo "CI_COMMIT_BEFORE_SHA=$CI_COMMIT_BEFORE_SHA"

      # 1) Détecter les values modifiés
      if [ "${CI_COMMIT_BEFORE_SHA:-}" = "0000000000000000000000000000000000000000" ] || [ -z "${CI_COMMIT_BEFORE_SHA:-}" ]; then
        echo "No before SHA => fallback: scan all values"
        CHANGED_VALUES="$(find "${VALUES_ROOT}" -type f -name "*.y*ml" | sort || true)"
      else
        CHANGED_VALUES="$(git diff --name-only "${CI_COMMIT_BEFORE_SHA}" "${CI_COMMIT_SHA}" \
          | grep -E "^${VALUES_ROOT}/(development|staging|production)/.+\.(ya?ml)$" || true)"
      fi

      if [ -z "${CHANGED_VALUES}" ]; then
        echo "No values changes detected => nothing to render"
        exit 0
      fi

      echo "Changed values:"
      echo "${CHANGED_VALUES}"

      rm -f deploy.env apps-to-sync.txt || true
      touch apps-to-sync.txt

      # 2) Render uniquement les apps touchées
      for f in ${CHANGED_VALUES}; do
        # f = platform-gitops/values/<env>/<kind>/<app>.yaml
        ENV="$(echo "$f" | awk -F/ '{print $(NF-2)}')"       # development|staging|production
        KIND="$(echo "$f" | awk -F/ '{print $(NF-1)}')"      # ms|backstage|batch
        APP_FILE="$(basename "$f")"
        APP="${APP_FILE%.*}"

        # Chart par défaut selon KIND
        if [ "$KIND" = "backstage" ]; then
          CHART_PATH="${DEFAULT_CHART_BACKSTAGE}"
        elif [ "$KIND" = "batch" ]; then
          CHART_PATH="${DEFAULT_CHART_BATCH}"
        else
          CHART_PATH="${DEFAULT_CHART_MS}"
        fi

        RELEASE_NAME="${APP}"
        ARGO_APP="${APP}-${ENV}"

        echo "----"
        echo "ENV=${ENV} KIND=${KIND} APP=${APP}"
        echo "VALUES=${f}"
        echo "CHART=${CHART_PATH}"
        echo "RELEASE=${RELEASE_NAME}"

        OUT="${MANIFESTS_OUT_DIR}/${ENV}/${APP}/manifest.yaml"
        mkdir -p "$(dirname "${OUT}")"

        # deps chart si besoin
        if [ -f "${CHART_PATH}/Chart.yaml" ]; then
          helm dependency build "${CHART_PATH}" || true
        fi

        helm template "${RELEASE_NAME}" "${CHART_PATH}" \
          -f "${f}" \
          > "${OUT}"

        echo "${ARGO_APP}" >> apps-to-sync.txt
      done

      # 3) Commit uniquement si manifests changent
      git add "${MANIFESTS_OUT_DIR}/" || true
      if git diff --cached --quiet; then
        echo "No diff => no commit"
      else
        git commit -m "chore(gitops): render manifests (${CI_COMMIT_SHORT_SHA})"
        git push origin "${CI_COMMIT_BRANCH}" ${CI_SKIP_PUSH_OPTION}
      fi

      # 4) Exporter la liste d'apps à sync
      APPS_CSV="$(sort -u apps-to-sync.txt | paste -sd, -)"
      echo "DEPLOY_APPS=${APPS_CSV}" > deploy.env
      echo "Apps to sync: ${APPS_CSV}"
  artifacts:
    reports:
      dotenv: deploy.env
    expire_in: 1 day

deploy_argocd:
  stage: deploy
  image: layer-kraft.registry.saas.cagip.group.gca/ci-tools/helm:3
  needs: ["render_manifests"]
  rules:
    - when: on_success
  variables:
    NS: "sfs-sandbox-development"
  script:
    - |
      filter_sync_app() {
        local local_app="$1"
        local local_env="$2"
        if ! echo " ${ARGO_SYNC_ALLOWED_ENVS} " | grep -q "${local_env}" ; then
          return 1
        fi 
        if [ -n "${ARGO_SYNC_DISABLED_APPS}" ]; then
          echo " ${ARGO_SYNC_DISABLED_APPS} " | grep -q " ${local_app} " && return 1
        fi 
        return 0
      }

      if [ -z "${DEPLOY_APPS:-}" ]; then
        echo "No apps to deploy"
        exit 0
      fi

      echo "Sync apps: ${DEPLOY_APPS}"
      FILTERED_DEPLOY=""
      SYNCED_APP=""
      while read -r app; do
        [ -z "$app" ] && continue
        ENVIRONMENT="${app##*-}"
        APPLICATION="${app%-${ENVIRONMENT}}"
        if [ "${ENVIRONNEMENT}" = "${PRODUCTION_ENV}" ]; then
          ARGO_APP_NAME=${APPLICATION}
        else 
          ARGO_APP_NAME="${APPLICATION}-${ENVIRONMENT}"
        fi
        if filter_sync_app "$APPLICATION" "$ENVIRONNEMENT"; then
          echo "---- Sync ${ARGO_APP_NAME}----"
          argocd app create ${ARGO_APP_NAME}  \
                            --server ${ARGOCD_HOST} \
                            --project ${NS} \
                            --repo https://${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git \
                            --revision $CI_COMMIT_REF_NAME \
                            --path $MANIFESTS_OUT_DIR/${ENVIRONMENT}/${APPLICATION} \
                            --dest-namespace ${NS} \
                            --dest-server $K8S_CLUSTER_URL \
                            --auth-token ${ARGOCD_TOKEN} \
                            --upsert
          argocd app sync ${ARGO_APP_NAME} \
                            --server ${ARGOCD_HOST} \
                            --auth-token ${ARGOCD_TOKEN} \
                            --prune
          argocd app wait ${ARGO_APP_NAME} \
                            --server ${ARGOCD_HOST} \
                            --auth-token ${ARGOCD_TOKEN} \
                            --timeout 120
          SYNCED_APP="${SYNCED_APP}${ARGO_APP_NAME},"
        else
          FILTERED_DEPLOY="${FILTERED_DEPLOY}${ARGO_APP_NAME},"
        fi
      done <<< "$(echo "${DEPLOY_APPS}" | tr ',' '\n')"
      echo "SYNCED APPS = ${SYNCED_APP}"
      echo "FILTERED APPS = ${FILTERED_DEPLOY}"
